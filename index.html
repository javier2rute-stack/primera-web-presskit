<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Carlos V | Press Kit</title>
  <link rel="canonical" href="https://djpresskit.com/djcarlosv">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="press-kit">
    <article class="kit-card" aria-label="Press kit de DJ Carlos V">
      <header class="kit-header">
        <h1>DJ CARLOS V</h1>
      </header>

      <section class="profile">
        <div class="photo" aria-label="Foto de DJ Carlos V">
          <span>Foto</span>
        </div>

        <div class="bio">
          <h2>BIOGRAFÍA</h2>
          <p>DJ especializado en Tech House...</p>
        </div>
      </section>

      <section class="kit-section">
        <h2>GÉNEROS</h2>
        <ul>
          <li>Tech House</li>
          <li>House</li>
          <li>Afro House</li>
        </ul>
      </section>

      <section class="kit-section">
        <h2>REDES</h2>
        <ul class="links-list">
          <li><a href="#">Instagram</a></li>
          <li><a href="#">Spotify</a></li>
          <li><a href="#">SoundCloud</a></li>
        </ul>
      </section>

      <section class="kit-section">
        <h2>EVENTOS</h2>
        <ul>
          <li>Tomorrowland</li>
          <li>Amnesia Ibiza</li>
          <li>Fabrik Madrid</li>
        </ul>
      </section>

      <section class="kit-section contact">
        <h2>CONTACTO</h2>
        <a href="mailto:djcarlos@email.com">djcarlos@email.com</a>
      </section>

      <section class="kit-section public-link">
        <h2>PRESS KIT ONLINE</h2>
        <a href="https://djpresskit.com/djcarlosv">djpresskit.com/djcarlosv</a>
      </section>
    </article>
  </main>
</body>
</html>
